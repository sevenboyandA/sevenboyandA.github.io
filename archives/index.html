<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Minimalist</title>
    <!-- 引入主题的 CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 补充 detail-view 的基础样式 */
        .detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245,245,245,0.98);
            display: none;
            opacity: 0;
            z-index: 999;
            flex-direction: column;
            padding: 5%;
            box-sizing: border-box;
        }
        .close-btn {
            cursor: pointer;
            font-weight: 900;
            margin-bottom: 20px;
            align-self: flex-end;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }
        .art-info {
            margin-top: 15px;
        }
        .art-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }
        .art-info p {
            margin: 0;
            color: #666;
        }
    </style>
<meta name="generator" content="Hexo 7.3.0"></head>
<body>
    <nav class="nav-bar">
        <div class="logo">ART COLLECTION</div>
        <ul class="nav-links">
            <li>HOME</li>
            <li>ARTISTS</li>
            <li>EXHIBITIONS</li>
        </ul>
        <div class="hamburger"><span></span><span></span></div>
    </nav>

    <header class="hero-title">
        <h1 class="split-text">ART COLLECTION</h1>
    </header>

    <main class="gallery-container">
        <div class="art-item" data-id="1">
            <div class="img-wrapper">
                <!-- 注意：图片请放在 themes/my-art-theme/source/ 下，或者用在线图床 -->
                <img src="https://picsum.photos/800/600?random=1" alt="Art 1">
            </div>
            <div class="art-info">
                <h3>CLAUDE MONET</h3>
                <p>Water Lilies, 1906</p>
            </div>
        </div>
        <!-- 复制上面的块添加更多作品 -->
        <div class="art-item" data-id="2">
            <div class="img-wrapper">
                <img src="https://picsum.photos/800/600?random=2" alt="Art 2">
            </div>
            <div class="art-info">
                <h3>VINCENT VAN GOGH</h3>
                <p>Starry Night, 1889</p>
            </div>
        </div>
    </main>

    <div class="detail-view">
        <div class="close-btn">CLOSE</div>
        <div class="detail-content">
            <div class="detail-img-placeholder"></div>
            <div class="detail-text">
                <h2 class="detail-title">Artwork Title</h2>
                <p class="detail-desc">Artwork description goes here.</p>
            </div>
        </div>
    </div>

    <!-- 引入 GSAP 和主题的 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
